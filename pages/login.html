<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Box - Đăng Nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mb-purple': {
                            light: '#c4b5fd', /* Purple Light */
                            main: '#8b5cf6',  /* Main Purple */
                            dark: '#6d28d9'   /* Purple Dark */
                        },
                        'mb-dark': '#1e1b4b', /* Deep Dark */
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        [x-cloak] { display: none !important; }
        
        /* Hiệu ứng Glow nền */
        .glow-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(30,27,75,0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>

<body class="bg-[#1e1b4b] min-h-screen text-white flex items-center justify-center relative overflow-hidden" x-data="authForm()">

    <div class="glow-bg top-[-50px] left-[-50px]"></div>
    <div class="glow-bg bottom-[-50px] right-[-50px] w-[400px] h-[400px]"></div>

    <main class="w-full max-w-md px-6 relative z-10">
        <div class="flex flex-col items-center justify-center mb-8">
            <div class="p-3 bg-mb-purple-main rounded-2xl shadow-[0_0_20px_rgba(139,92,246,0.4)] mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tighter">MUSIC<span class="text-mb-purple-main">BOX</span></h1>
            <p class="text-mb-purple-light text-sm mt-2">Hệ thống quản trị & Đặt phòng</p>
        </div>

        <div class="glass-card rounded-3xl p-8 border-t border-white/10">
            <h2 class="text-xl font-bold mb-6 text-center">Đăng nhập tài khoản</h2>

            <div x-show="errorMessage" x-cloak 
                 class="mb-6 p-3 rounded-xl bg-rose-500/10 border border-rose-500/20 flex items-center gap-3 text-rose-400 text-sm"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 -translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <span x-text="errorMessage"></span>
            </div>

            <form @submit.prevent="handleLogin" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-mb-purple-light uppercase tracking-wider mb-2">Tên đăng nhập / SĐT</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500 group-focus-within:text-mb-purple-main transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                        </div>
                        <input type="text" x-model="username" 
                            class="w-full bg-black/20 border border-white/10 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-mb-purple-main focus:ring-1 focus:ring-mb-purple-main transition-all" 
                            placeholder="Nhập tài khoản của bạn">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-xs font-semibold text-mb-purple-light uppercase tracking-wider">Mật khẩu</label>
                        <a href="#" class="text-xs text-mb-purple-main hover:text-mb-purple-light transition-colors">Quên mật khẩu?</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500 group-focus-within:text-mb-purple-main transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        </div>
                        <input :type="showPassword ? 'text' : 'password'" x-model="password" 
                            class="w-full bg-black/20 border border-white/10 rounded-xl py-3.5 pl-11 pr-12 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-mb-purple-main focus:ring-1 focus:ring-mb-purple-main transition-all" 
                            placeholder="••••••••">
                        
                        <button type="button" @click="showPassword = !showPassword" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-white transition-colors">
                            <svg x-show="!showPassword" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                            <svg x-show="showPassword" x-cloak class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" :disabled="isLoading" 
                    class="w-full bg-mb-purple-main hover:bg-mb-purple-dark text-white font-bold py-3.5 rounded-xl transition-all shadow-[0_4px_15px_rgba(139,92,246,0.3)] hover:shadow-[0_4px_25px_rgba(139,92,246,0.5)] flex justify-center items-center gap-2 mt-4 disabled:opacity-70 disabled:cursor-not-allowed">
                    
                    <span x-show="!isLoading">Đăng Nhập Ngay</span>
                    
                    <svg x-show="isLoading" x-cloak class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span x-show="isLoading" x-cloak>Đang xử lý...</span>
                </button>
                <div style="text-align: center;font-size: small;">Chưa có tài khoản ? <a style="color: bisque;" href="/system-ui-demo/pages/register.html">/ Đăng ký</a></div>
            </form>
        </div>

        <p class="text-center text-xs text-gray-500 mt-8">
            © 2026 MusicBox System. All rights reserved.
        </p>
    </main>

    <script>
        function authForm() {
            return {
                username: '',
                password: '',
                showPassword: false,
                isLoading: false,
                errorMessage: '',

                handleLogin() {
                    this.errorMessage = ''; // Reset lỗi

                    // 1. Validation cơ bản (QA check)
                    if (!this.username.trim() || !this.password.trim()) {
                        this.errorMessage = 'Vui lòng nhập đầy đủ tài khoản và mật khẩu!';
                        return;
                    }

                    if (this.password.length < 6) {
                        this.errorMessage = 'Mật khẩu phải có ít nhất 6 ký tự!';
                        return;
                    }

                    // 2. Bật loading
                    this.isLoading = true;

                    // 3. Giả lập gọi API (delay 1.5s)
                    setTimeout(() => {
                        // Hardcode logic test cho Tuấn
                        if (this.username === 'admin' || this.username === 'tuan') {
                            // Thành công -> Lưu token giả -> Chuyển hướng
                            localStorage.setItem('isLoggedIn', 'true');
                            localStorage.setItem('userRole', 'admin');
                            window.location.href = 'history.html'; // Chuyển về trang Lịch sử cậu vừa làm
                        } else {
                            // Thất bại
                            this.errorMessage = 'Tài khoản hoặc mật khẩu không chính xác!';
                            this.isLoading = false;
                        }
                    }, 1500);
                }
            }
        }
    </script>
</body>
</html>
