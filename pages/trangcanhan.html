<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Box - Quản lý cá nhân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mb-purple': { 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed' },
                        'mb-dark': '#0f172a',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        [x-cloak] {
            display: none !important;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @keyframes modalScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-modal {
            animation: modalScale 0.3s ease-out forwards;
        }

        .glass-glow {
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.2), inset 0 0 1px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body x-data="{ 
    userRole: 'Khách', 
    tab: 'history',
    showDetail: false,
    showEdit: false,
    selectedBooking: null,
    visibleItems: 3,
    
    user: { name: 'Nguyễn Văn A', phone: '0901 234 567', points: 1250, avatar: 'https://i.pravatar.cc/150?u=a' },
    
    history: [
        // ...existing 3 items...
        { 
            id: 'BK-77', room: '208', type: 'Thường', 
            date: '08/04/2026', in: '18:00', out: '20:00', duration: 2,
            roomPrice: '250.000', serviceTotal: '100.000', total: '350.000',
            roomImg: 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400',
            services: [
                { name: 'Nước ngọt Pepsi', qty: 2, price: '20.000', img: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=100' }
            ] 
        },
        { 
            id: 'BK-66', room: '305', type: 'VIP', 
            date: '05/04/2026', in: '21:00', out: '23:00', duration: 2,
            roomPrice: '900.000', serviceTotal: '300.000', total: '1.200.000',
            roomImg: 'https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=400',
            services: [
                { name: 'Bia Tiger', qty: 6, price: '30.000', img: 'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=100' }
            ] 
        },
        { 
            id: 'BK-55', room: '405', type: 'VIP', 
            date: '01/04/2026', in: '19:30', out: '22:00', duration: 2.5,
            roomPrice: '1.000.000', serviceTotal: '500.000', total: '1.500.000',
            roomImg: 'https://plus.unsplash.com/premium_photo-1681830630610-9f26c9729b75?w=400',
            services: [
                { name: 'Trái cây dĩa (Nhỏ)', qty: 1, price: '120.000', img: 'https://images.unsplash.com/photo-1519996529931-28324d5a630e?w=100' }
            ] 
        },
        { 
            id: 'BK-44', room: '101', type: 'Thường', 
            date: '28/03/2026', in: '17:00', out: '19:00', duration: 2,
            roomPrice: '200.000', serviceTotal: '80.000', total: '280.000',
            roomImg: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400',
            services: [
                { name: 'Nước suối Aquafina', qty: 2, price: '15.000', img: 'https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=100' }
            ] 
        }
    ]
}">

    <header class="bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-[100] border-b border-white/10">
        <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-3 group">
                <div
                    class="p-2 bg-mb-purple-600 rounded-xl shadow-[0_0_15px_rgba(124,58,237,0.4)] group-hover:bg-mb-purple-500 transition">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z">
                        </path>
                    </svg>
                </div>
                <span class="text-xl font-extrabold tracking-tighter uppercase leading-none">Music<span
                        class="text-mb-purple-400">Box</span></span>
            </a>



            <nav class="flex items-center gap-6 ml-8">
                <a href="../index.html"
                    class="text-sm font-bold text-white hover:text-mb-purple-400 transition-colors uppercase tracking-widest">Trang
                    chủ</a>
                <a href="./phonghientai.html"
                    class="text-sm font-bold text-white hover:text-mb-purple-400 transition-colors uppercase tracking-widest">Phòng
                    hiện tại</a>
            </nav>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-3 pl-4 border-l border-white/10">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Khách hàng</p>
                        <p class="text-xs font-bold text-white">Nguyễn Văn A</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg border border-white/10 p-0.5 bg-white/5">
                        <img src="https://i.pravatar.cc/150?u=a" class="w-full h-full rounded-md object-cover">
                    </div>
                </div>

            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto p-6 flex flex-col md:flex-row gap-8 mt-4">
        <aside class="w-full md:w-72 space-y-6">
            <div class="glass rounded-2xl p-6 bg-white/[0.01]">
                <div class="flex flex-col items-center">
                    <div class="relative mb-4">
                        <img :src="user.avatar" class="w-20 h-20 rounded-full border border-white/10 p-1">
                        <div class="absolute -bottom-1 -right-1 bg-purple-600 px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-tighter shadow-lg"
                            x-text="userRole"></div>
                    </div>
                    <div class="flex items-center gap-2 mb-1">
                        <h2 class="text-lg font-bold text-white" x-text="user.name"></h2>
                        <button @click="showEdit = true" class="p-1 rounded hover:bg-mb-purple-500/20 transition"
                            title="Sửa thông tin">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-mb-purple-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15.232 5.232l3.536 3.536M9 13h3l8-8a2.828 2.828 0 10-4-4l-8 8v3zm0 0v3a1 1 0 001 1h3" />
                            </svg>
                        </button>
                    </div>
                    <p class="text-gray-400 text-xs font-medium" x-text="user.phone"></p>
                </div>

                <div class="mt-6 p-4 bg-white/[0.02] rounded-xl border border-white/5 text-center">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1">Điểm tích lũy</p>
                    <p class="text-2xl font-black text-white" x-text="user.points.toLocaleString() + ' điểm'"></p>
                </div>
            </div>

            <nav class="space-y-1">
                <button @click="tab = 'info'"
                    :class="tab === 'info' ? 'bg-purple-600 shadow-lg shadow-purple-900/20' : 'text-gray-400 hover:bg-white/5'"
                    class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold transition-all flex items-center gap-3">
                    Thông tin cá nhân
                </button>
                <button @click="tab = 'history'"
                    :class="tab === 'history' ? 'bg-purple-600 shadow-lg shadow-purple-900/20' : 'text-gray-400 hover:bg-white/5'"
                    class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold transition-all flex items-center gap-3">
                    Lịch sử thuê phòng
                </button>
                <button
                    class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold text-red-500 hover:bg-red-500/10 transition-all uppercase tracking-tight mt-4 border-t border-white/5 pt-6">
                    <a href="./dangnhap.html">Đăng xuất</a>
                </button>
            </nav>
        </aside>

        <main class="flex-grow">
            <div x-show="tab === 'history'" x-cloak class="space-y-4">
                <div class="flex justify-between items-center mb-6 px-1">
                    <h3 class="text-sm font-bold uppercase tracking-[0.2em] text-gray-500">Giao dịch gần đây</h3>
                    <span class="text-[10px] bg-white/5 px-3 py-1.5 rounded-full text-gray-400 font-bold"
                        x-text="history.length + ' PHÒNG ĐÃ THUÊ'"></span>
                </div>

                <div class="space-y-2">
                    <template x-for="(item, index) in history.slice(0, visibleItems)" :key="item.id">
                        <div
                            class="glass rounded-xl overflow-hidden border border-white/5 hover:border-mb-purple-400 transition-all group flex items-center gap-3 p-3">
                            <img :src="item.roomImg" class="w-16 h-16 rounded-lg object-cover border border-white/10">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-0.5">
                                    <span class="font-bold text-white text-base truncate"
                                        x-text="'Phòng ' + item.room"></span>
                                    <span
                                        class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest bg-purple-500/10 text-purple-500"
                                        x-text="item.type"></span>
                                </div>
                                <div class="flex flex-wrap gap-x-4 gap-y-0.5 text-xs text-gray-400">
                                    <span x-text="item.date"></span>
                                    <span>|</span>
                                    <span x-text="item.in + ' - ' + item.out"></span>
                                    <span>|</span>
                                    <span x-text="item.duration.toFixed(1) + ' Giờ'"></span>
                                </div>
                            </div>
                            <div class="text-right min-w-[90px]">
                                <p class="text-[10px] text-gray-500 font-bold uppercase mb-0.5">Tổng</p>
                                <p class="text-base font-black text-emerald-400 mb-1" x-text="item.total + 'đ'"></p>
                                <button @click="selectedBooking = item; showDetail = true"
                                    class="text-[10px] font-bold text-mb-purple-500 bg-white/5 hover:bg-mb-purple-500/10 px-3 py-1 rounded transition-all uppercase">Chi
                                    tiết</button>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="mt-16 flex justify-center">
                    <button
                        class="group flex flex-col items-center gap-2 text-mb-purple-400 hover:text-white transition-all">
                        <span class="font-bold tracking-widest uppercase text-xs">Xem thêm giao dịch</span>
                        <svg class="w-6 h-6 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- Modal sửa thông tin cá nhân -->
        <div x-show="showEdit" x-cloak x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0" class="fixed inset-0 z-[9999] flex items-center justify-center p-4">

            <div class="absolute inset-0 bg-mb-dark/80 backdrop-blur-md" @click="showEdit = false"></div>

            <form @submit.prevent="user.name = $refs.name.value; showEdit = false"
                class="animate-modal glass-glow w-full max-w-sm rounded-[2rem] overflow-hidden relative z-10 border border-white/20 bg-[#161b33]/90 shadow-2xl">

                <div
                    class="px-6 py-5 border-b border-white/10 flex justify-between items-center bg-gradient-to-r from-mb-purple-600/20 to-transparent">
                    <div>
                        <h4 class="font-extrabold text-white text-lg tracking-tight uppercase">Sửa thông tin</h4>
                        <p class="text-[10px] text-mb-purple-400 font-bold tracking-[0.2em]">CẬP NHẬT TÀI KHOẢN</p>
                    </div>
                    <button type="button" @click="showEdit = false"
                        class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 text-gray-400 hover:text-white hover:bg-rose-500/20 transition-all duration-300">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div class="p-6 flex flex-col gap-5">
                    <div class="space-y-2 group">
                        <label class="text-[11px] font-black text-mb-purple-400 uppercase ml-1 tracking-wider">Họ và
                            Tên</label>
                        <div class="relative">
                            <input x-ref="name" :value="user.name"
                                class="w-full rounded-2xl px-4 py-3 bg-white/5 border border-white/10 text-white focus:outline-none focus:border-mb-purple-500 focus:ring-4 focus:ring-mb-purple-500/20 transition-all duration-300 placeholder-gray-500"
                                placeholder="Nhập tên của bạn..." required>
                            <div
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-mb-purple-400 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-2 opacity-60">
                        <label class="text-[11px] font-black text-gray-400 uppercase ml-1 tracking-wider">Số điện thoại
                            (Cố định)</label>
                        <div class="relative">
                            <input :value="user.phone"
                                class="w-full rounded-2xl px-4 py-3 bg-black/20 border border-white/5 text-gray-400 cursor-not-allowed"
                                disabled>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                    </path>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-6 pt-2 flex gap-3">
                    <button type="button" @click="showEdit = false"
                        class="flex-1 py-3 rounded-2xl bg-white/5 hover:bg-white/10 text-white font-bold text-xs uppercase tracking-widest transition-all duration-300">
                        Hủy
                    </button>
                    <button type="submit"
                        class="flex-[2] py-3 rounded-2xl bg-gradient-to-r from-mb-purple-600 to-mb-purple-500 hover:shadow-[0_0_20px_rgba(139,92,246,0.4)] text-white font-bold text-xs uppercase tracking-[0.2em] transition-all duration-300 active:scale-95">
                        Lưu thay đổi
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div x-show="showDetail" x-cloak class="fixed inset-0 z-[999] flex items-center justify-center p-2">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" @click="showDetail = false"></div>
        <div
            class="glass w-full max-w-md rounded-2xl overflow-hidden shadow-2xl relative z-10 border-white/10 bg-slate-900">
            <div class="p-4 border-b border-white/5 flex justify-between items-center bg-slate-950/30">
                <div>
                    <h4 class="font-bold text-white text-lg">Hóa đơn điện tử</h4>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest"
                        x-text="'MÃ: ' + selectedBooking?.id + ' | NGÀY: ' + selectedBooking?.date"></p>
                </div>
                <button @click="showDetail = false"
                    class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 text-gray-400 hover:text-white transition-colors">✕</button>
            </div>

            <div class="p-4 overflow-y-auto no-scrollbar max-h-[60vh]">
                <div class="mb-6">
                    <h5 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3 px-1">Chi phí thuê
                        phòng</h5>
                    <div class="flex items-center gap-3 p-3 rounded-xl bg-white/[0.03] border border-white/5 group">
                        <img :src="selectedBooking?.roomImg"
                            class="w-12 h-12 rounded-lg object-cover border border-white/10">
                        <div class="flex-grow min-w-0">
                            <p class="font-bold text-white text-sm truncate"
                                x-text="'Phòng ' + selectedBooking?.room + ' (' + selectedBooking?.type + ')'">
                            </p>
                            <p class="text-xs text-gray-400 font-semibold"
                                x-text="selectedBooking?.in + ' - ' + selectedBooking?.out + ' | ' + selectedBooking?.duration.toFixed(1) + ' Giờ'">
                            </p>
                        </div>
                        <p class="font-extrabold text-white text-base" x-text="selectedBooking?.roomPrice + 'đ'"></p>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mt-3 mb-3 px-1">
                            <h5 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Dịch vụ ăn uống
                            </h5>
                            <p class="text-xs font-bold text-gray-300" x-text="selectedBooking?.serviceTotal + 'đ'"></p>
                        </div>
                        <div class="space-y-1.5">
                            <template x-for="s in selectedBooking?.services">
                                <div
                                    class="flex items-center gap-2 p-2 rounded-lg bg-white/[0.01] border border-white/5 hover:bg-white/[0.03] transition-colors">
                                    <img :src="s.img"
                                        class="w-8 h-8 rounded object-cover bg-slate-800 border border-white/10">
                                    <div class="flex-grow min-w-0">
                                        <p class="font-bold text-xs text-white truncate mb-0.5" x-text="s.name"></p>
                                        <p class="text-[10px] text-gray-500 font-bold"
                                            x-text="s.qty + ' x ' + s.price + 'đ'"></p>
                                    </div>
                                    <p class="font-bold text-xs text-purple-400"
                                        x-text="(parseInt(s.qty) * parseInt(s.price.replace(/\./g,''))).toLocaleString('vi-VN') + 'đ'">
                                    </p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="p-4 bg-slate-800/50 border-t border-white/5">
                    <div
                        class="flex justify-between items-center mb-4 border border-emerald-500/20 bg-emerald-500/5 p-3 rounded-xl">
                        <div class="text-left">
                            <p class="text-[10px] text-emerald-300 font-bold uppercase tracking-widest mb-1">Tổng cộng
                            </p>
                            <p class="text-xl font-black text-emerald-500" x-text="selectedBooking?.total + 'đ'"></p>
                        </div>
                        <div class="text-right flex flex-col items-end gap-1.5">
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Trạng thái</p>
                            <span
                                class="text-[10px] font-bold text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/30 uppercase tracking-wider">Đã
                                hoàn tất</span>
                        </div>
                    </div>
                    <button @click="showDetail = false"
                        class="w-full py-3 bg-white text-slate-900 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-purple-600 hover:text-white transition-all shadow">Đóng
                        hóa đơn</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
