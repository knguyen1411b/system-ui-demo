<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicBox - Hệ thống quản lý phòng hát</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 1. KHAI BÁO MÀU SẮC ĐỒNG BỘ */
        :root {
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
            --primary-light: #c4b5fd;
            --bg-deep: #0f172a;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #fb923c;
            --success: #2ecc71;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(30, 27, 75, 0.2) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. SIDEBAR - ĐÃ CHỈNH GIỐNG Y ĐÚC BẢN TRƯỚC */
        .sidebar {
            width: 260px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
        }

        .brand {
            padding: 40px 20px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
            letter-spacing: 4px;
            border-bottom: 1px solid var(--border);
        }

        .user-profile {
            margin: 20px;
            padding: 15px;
            background: var(--surface);
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .user-info .name { font-size: 14px; font-weight: 600; display: block; color: var(--text-main); }
        .user-info .role { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }

        .menu-container {
            padding: 10px 15px;
            flex: 1;
            overflow-y: auto;
        }

        .menu-item { margin-bottom: 8px; }

        .menu-title {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dim);
            border-radius: 10px;
            transition: 0.3s;
            cursor: pointer;
            font-size: 15px;
        }
        
        .menu-title i:first-child { width: 25px; }

        .menu-title:hover, .menu-item.active .menu-title {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary-light);
        }

        .submenu {
            display: none;
            padding: 5px 0 5px 40px;
        }

        .menu-item.active .submenu { display: block; }

        .submenu a {
            display: block;
            padding: 8px 0;
            font-size: 13px;
            color: var(--text-dim);
            text-decoration: none;
            transition: 0.3s;
        }

        .submenu a:hover { 
            color: white; 
            transform: translateX(5px);
        }

        .submenu a.active-link {
            color: var(--primary);
            font-weight: 600;
        }

        /* 3. NỘI DUNG CHÍNH */
        .main-content {
            flex: 1;
            padding: 40px 50px;
            overflow-y: auto;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-2px); }

        /* 4. GRID PHÒNG */
        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .room-card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: 0.3s;
        }

        .room-card:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .room-thumb {
            height: 180px;
            position: relative;
            background: #222;
        }

        .room-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .status-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--success);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            backdrop-filter: blur(4px);
        }

        .room-details { padding: 25px; }
        .room-details h3 { 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 18px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-size: 12px;
            color: var(--text-dim);
            background: rgba(255,255,255,0.02);
            padding: 12px;
            border-radius: 12px;
        }
        
        .price-row b { color: var(--primary-light); font-size: 14px; display: block; margin-top: 4px; }

        /* 5. ACTION BOX */
        .btn-rent {
            width: 100%;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary-light);
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-rent:hover { background: var(--primary); color: white; }

        .rent-form-container {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            gap: 12px;
            border: 1px solid var(--border);
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rent-form-container input {
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- SIDEBAR ĐÃ ĐỒNG BỘ -->
    <div class="sidebar">
        <div class="brand">MUSICBOX</div>
        
        <div class="user-profile">
            <div class="avatar"><i class="fas fa-user-tie"></i></div>
            <div class="user-info">
                <span class="name">Nguyễn Quốc Đạt</span>
                <span class="role">Nhân viên</span>
            </div>
        </div>

        <div class="menu-container">
            <div class="menu-item active">
                <div class="menu-title" onclick="toggleAccordion(this)">
                    <span><i class="fas fa-columns"></i> Quản lý phòng</span>
                    <i class="fas fa-chevron-down" style="font-size: 10px;"></i>
                </div>
                <div class="submenu">
                    <a href="thuephong.html" class="active-link">Thuê phòng</a>
                    <a href="traphong.html">Trả phòng</a>
                </div>
            </div>

            <div class="menu-item">
                <div class="menu-title" onclick="toggleAccordion(this)">
                    <span><i class="fas fa-concierge-bell"></i> Tiếp nhận yêu cầu</span>
                    <i class="fas fa-chevron-down" style="font-size: 10px;"></i>
                </div>
                <div class="submenu">
                    <a href="dichvu.html">Dịch vụ</a>
                    <a href="baohong.html">Báo hỏng</a>
                </div>
            </div>
        </div>
    </div>

    <!-- NỘI DUNG CHÍNH -->
    <div class="main-content">
        <div class="header-top">
            <h1>DANH SÁCH PHÒNG HÁT</h1>
        </div>

        <div class="room-grid">
            <!-- Phòng 402 -->
            <div class="room-card">
                <div class="room-thumb">
                    <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=500" alt="Karaoke Room">
                    <span class="status-tag">TRỐNG</span>
                </div>
                <div class="room-details">
                    <h3>Phòng 402 <span style="color:var(--accent); font-size: 12px; font-weight: 800;">VIP</span></h3>
                    <div class="price-row">
                        <div>Ngày thường<b>150K/h</b></div>
                        <div>Cuối tuần<b>200K/h</b></div>
                        <div>Ngày lễ<b>300K/h</b></div>
                    </div>
                    <div class="action-box">
                        <button class="btn-rent" onclick="openRentForm(this)">THUÊ PHÒNG NGAY</button>
                        <div class="rent-form-container">
                            <label style="font-size: 12px; color: var(--text-dim);">Số điện thoại khách hàng:</label>
                            <input type="text" placeholder="Khách vãng lai...">
                            <button class="btn-save" onclick="handleSave(this)">XÁC NHẬN THUÊ</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Phòng 305 -->
            <div class="room-card">
                <div class="room-thumb">
                    <img src="https://images.unsplash.com/photo-1598387993441-a364f854c3e1?q=80&w=500" alt="Karaoke Room">
                    <span class="status-tag">TRỐNG</span>
                </div>
                <div class="room-details">
                    <h3>Phòng 305 <span style="color:var(--accent); font-size: 12px; font-weight: 800;">VIP</span></h3>
                    <div class="price-row">
                        <div>Ngày thường<b>180K/h</b></div>
                        <div>Cuối tuần<b>250K/h</b></div>
                        <div>Ngày lễ<b>350K/h</b></div>
                    </div>
                    <div class="action-box">
                        <button class="btn-rent" onclick="openRentForm(this)">THUÊ PHÒNG NGAY</button>
                        <div class="rent-form-container">
                            <label style="font-size: 12px; color: var(--text-dim);">Số điện thoại khách hàng:</label>
                            <input type="text" placeholder="...">
                            <button class="btn-save" onclick="handleSave(this)">XÁC NHẬN THUÊ</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleAccordion(element) {
            const menuItem = element.parentElement;
            menuItem.classList.toggle('active');
        }

        function openRentForm(btn) {
            const formContainer = btn.nextElementSibling;
            formContainer.style.display = "flex";
            btn.style.display = "none";
        }

        function handleSave(saveBtn) {
            const container = saveBtn.parentElement;
            const inputVal = container.querySelector('input').value;
            const actionBox = container.parentElement;
            const rentBtn = actionBox.querySelector('.btn-rent');

            const customer = inputVal.trim() === "" ? "Khách vãng lai" : inputVal;
            alert("Đã lưu thông tin thuê phòng!\nKhách hàng: " + customer);

            container.style.display = "none";
            rentBtn.style.display = "block";
            rentBtn.innerText = "ĐANG SỬ DỤNG";
            rentBtn.disabled = true;
            rentBtn.style.background = "rgba(255,255,255,0.05)";
            rentBtn.style.borderColor = "var(--border)";
            rentBtn.style.color = "var(--text-dim)";
            
            const card = actionBox.closest('.room-card');
            const tag = card.querySelector('.status-tag');
            tag.innerText = "ĐANG BẬN";
            tag.style.background = "var(--danger)";
        }
    </script>
</body>
</html>
