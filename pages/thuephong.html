<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicBox - Hệ thống quản lý phòng hát</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 1. KHAI BÁO MÀU SẮC (Dựa trên bảng màu bạn cung cấp) */
        :root {
            --purple-light: #c4b5fd;
            --main-purple: #8b5cf6;
            --purple-dark: #6d28d9;
            --deep-dark: #1e1b4b; /* Màu nền tổng thể */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
            --accent-orange: #ff9800; /* Màu cam từ bản vẽ Paint */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--deep-dark);
            color: var(--text-white);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. SIDEBAR (Bố cục theo mẫu Paint) */
        .sidebar {
            width: 280px;
            background-color: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--purple-dark);
            display: flex;
            flex-direction: column;
        }

        .brand {
            padding: 25px;
            font-size: 22px;
            font-weight: bold;
            color: var(--text-white);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--glass-bg);
        }

        .user-profile {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--glass-bg);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--main-purple);
            background: #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-info .name {
            font-weight: bold;
            display: block;
        }

        .user-info .role {
            color: var(--accent-orange);
            font-size: 13px;
        }

        /* Menu Accordion */
        .menu-container {
            flex: 1;
            overflow-y: auto;
            padding-top: 10px;
        }

        .menu-item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .menu-title {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--accent-orange);
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-title:hover {
            background: var(--glass-bg);
        }

        .submenu {
            display: none;
            background: rgba(0, 0, 0, 0.2);
        }

        .submenu a {
            display: block;
            padding: 12px 45px;
            color: var(--purple-light);
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .submenu a:hover {
            color: white;
            background: var(--purple-dark);
        }

        /* Trạng thái mở menu */
        .menu-item.active .submenu {
            display: block;
        }
        .menu-item.active .fa-chevron-down {
            transform: rotate(180deg);
        }

        /* 3. NỘI DUNG CHÍNH */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-login {
            background: var(--main-purple);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Danh sách phòng */
        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .room-card {
            background: var(--glass-bg);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transition: 0.3s;
        }

        .room-card:hover {
            border-color: var(--main-purple);
            transform: translateY(-5px);
        }

        .room-thumb {
            height: 180px;
            position: relative;
            background: #222;
        }

        .room-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #2ecc71;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .room-details {
            padding: 20px;
        }

        .room-details h3 {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 12px;
            color: var(--purple-light);
            text-align: center;
        }

        /* Nút Thuê & Form nhập SĐT */
        .btn-rent {
            width: 100%;
            background: transparent;
            border: 1px solid var(--main-purple);
            color: var(--main-purple);
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-rent:hover {
            background: var(--main-purple);
            color: white;
        }

        .rent-form-container {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            display: none; /* Ẩn mặc định */
            flex-direction: column;
            gap: 10px;
            border: 1px solid var(--purple-dark);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rent-form-container input {
            background: #000;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 4px;
            color: white;
            outline: none;
        }

        .rent-form-container input:focus {
            border-color: var(--main-purple);
        }

        .btn-save {
            background: var(--main-purple);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">MUSICBOX</div>
        
        <div class="user-profile">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <div class="user-info">
                <span class="name">Nguyễn Quốc Đạt</span>
                <span class="role">Nhân viên</span>
            </div>
        </div>

        <div class="menu-container">
            <div class="menu-item">
                <div class="menu-title" onclick="toggleAccordion(this)">
                    Quản lý phòng <i class="fas fa-chevron-down"></i>
                </div>
                <div class="submenu">
                    <a href="#">Thuê phòng</a>
                    <a href="#">Trả phòng</a>
                </div>
            </div>

            <div class="menu-item">
                <div class="menu-title" onclick="toggleAccordion(this)">
                    Tiếp nhận yêu cầu <i class="fas fa-chevron-down"></i>
                </div>
                <div class="submenu">
                    <a href="#">Dịch vụ</a>
                    <a href="#">Báo hỏng</a>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="header-top">
            <h1>DANH SÁCH PHÒNG HÁT CÒN TRỐNG</h1>
        </div>

        <div class="room-grid">
            <div class="room-card">
                <div class="room-thumb">
                    <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=500" alt="Karaoke Room">
                    <span class="status-tag">TRỐNG</span>
                </div>
                <div class="room-details">
                    <h3>Phòng 402 <span style="color:#f1c40f; font-size: 12px;">VIP</span></h3>
                    <div class="price-row">
                        <div>Ngày thường<br><b>150K/h</b></div>
                        <div>Cuối tuần<br><b>200K/h</b></div>
                        <div>Ngày lễ<br><b>300K/h</b></div>
                    </div>
                    
                    <div class="action-box">
                        <button class="btn-rent" onclick="openRentForm(this)">THUÊ PHÒNG NGAY</button>
                        
                        <div class="rent-form-container">
                            <label style="font-size: 13px;">Nhập SĐT khách hàng:</label>
                            <input type="text" placeholder="Để trống nếu là khách vãng lai">
                            <button class="btn-save" onclick="handleSave(this)">LƯU THÔNG TIN</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="room-card">
                <div class="room-thumb">
                    <img src="https://images.unsplash.com/photo-1598387993441-a364f854c3e1?q=80&w=500" alt="Karaoke Room">
                    <span class="status-tag">TRỐNG</span>
                </div>
                <div class="room-details">
                    <h3>Phòng 305 <span style="color:#f1c40f; font-size: 12px;">VIP</span></h3>
                    <div class="price-row">
                        <div>Ngày thường<br><b>180K/h</b></div>
                        <div>Cuối tuần<br><b>250K/h</b></div>
                        <div>Ngày lễ<br><b>350K/h</b></div>
                    </div>
                    <div class="action-box">
                        <button class="btn-rent" onclick="openRentForm(this)">THUÊ PHÒNG NGAY</button>
                        <div class="rent-form-container">
                            <label style="font-size: 13px;">Nhập SĐT khách hàng:</label>
                            <input type="text" placeholder="...">
                            <button class="btn-save" onclick="handleSave(this)">LƯU THÔNG TIN</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Xử lý đóng/mở menu sidebar
        function toggleAccordion(element) {
            const menuItem = element.parentElement;
            menuItem.classList.toggle('active');
        }

        // Xử lý hiện Form khi bấm Thuê
        function openRentForm(btn) {
            const formContainer = btn.nextElementSibling;
            formContainer.style.display = "flex";
            btn.style.display = "none"; // Ẩn nút thuê để hiện form
        }

        // Xử lý Lưu
        function handleSave(saveBtn) {
            const container = saveBtn.parentElement;
            const inputVal = container.querySelector('input').value;
            const actionBox = container.parentElement;
            const rentBtn = actionBox.querySelector('.btn-rent');

            const customer = inputVal.trim() === "" ? "Khách vãng lai" : inputVal;

            alert("Đã lưu thông tin thuê phòng!\nKhách hàng: " + customer);

            // Cập nhật giao diện sau khi lưu
            container.style.display = "none";
            rentBtn.style.display = "block";
            rentBtn.innerText = "ĐANG SỬ DỤNG";
            rentBtn.disabled = true;
            rentBtn.style.background = "rgba(255,255,255,0.1)";
            rentBtn.style.borderColor = "#444";
            rentBtn.style.color = "#888";
            
            // Đổi tag trạng thái trên ảnh
            const card = actionBox.closest('.room-card');
            const tag = card.querySelector('.status-tag');
            tag.innerText = "ĐANG BẬN";
            tag.style.background = "#e74c3c";
        }
    </script>
</body>
</html>
