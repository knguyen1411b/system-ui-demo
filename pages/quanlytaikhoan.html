<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicBox - Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hidden {
            display: none !important;
        }

        /* Fix lỗi màu select option */
        select option {
            background-color: #1e293b !important;
            color: white;
        }
    </style>
</head>


<body x-data="{ user: {name: 'Nguyễn Văn Quản Lý'} }">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 glass border-r border-white/10 flex flex-col">
            <div class="p-6 flex items-center gap-3">
                <div class="p-2 bg-purple-600 rounded-lg shadow-lg shadow-purple-500/30">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z">
                        </path>
                    </svg>
                </div>
                <span class="text-xl font-black tracking-tighter">MUSIC<span class="text-purple-400">BOX</span></span>
            </div>

            <nav class="flex-1 mt-4 px-3 space-y-1">
                <a href="./dashboard.html"
                    class=" w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white transition-all group">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                        </path>
                    </svg>
                    <span class="text-sm font-bold">Dashboard</span>
                </a>

                <a href="./quanlytaikhoan.html"
                    class="sidebar-item active w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white hover:bg-white/5 transition-all group">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                        </path>
                    </svg>
                    <span class="text-sm font-bold">Quản lý tài khoản</span>
                </a>

                <a href="./quanlyphong.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all group">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                        </path>
                    </svg>
                    <span class="text-sm font-bold">Quản lý phòng</span>
                </a>

                <a href="./quanlyloaiphong.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all group">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                        </path>
                    </svg>
                    <span class="text-sm font-bold">Quản lý loại phòng</span>
                </a>

                <a href="./quanlydichvu.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all group">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                    <span class="text-sm font-bold">Quản lý dịch vụ</span>
                </a>
                <a href="quanlybanggia.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5  transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                    <span class="text-sm font-bold">Quản lý bảng giá</span>
                </a>
            </nav>
            <div class="p-4 border-t border-white/10 space-y-2" x-data="{ openSettings: false }">
                <div @click="openSettings = !openSettings"
                    class="flex items-center justify-between p-2 rounded-xl hover:bg-white/5 cursor-pointer transition-all group relative">

                    <div class="flex items-center gap-3">
                        <div
                            class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 flex items-center justify-center font-bold text-sm shadow-lg shadow-purple-500/20">
                            QL
                        </div>
                        <div>
                            <p class="text-xs font-bold text-gray-200" x-text="user.name">Quản lý</p>
                            <p class="text-[10px] text-gray-500 uppercase font-medium tracking-wider">Admin Role</p>
                        </div>
                    </div>

                    <div class="text-gray-500 group-hover:text-white transition-colors">
                        <svg class="w-4 h-4" :class="openSettings ? 'rotate-90' : ''" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </div>

                    <div x-show="openSettings" x-transition:enter="transition ease-out duration-100"
                        x-transition:enter-start="opacity-0 transform scale-95"
                        x-transition:leave="transition ease-in duration-75" @click.away="openSettings = false"
                        class="absolute bottom-full left-0 w-full mb-2 p-2 glass rounded-2xl shadow-2xl z-50">
                        <button onclick="confirmLogout()"
                            class="w-full flex items-center gap-3 px-3 py-2 rounded-xl text-red-400 hover:bg-red-500/10 transition-all group">
                            <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                                </path>
                            </svg>
                            <span class="text-xs font-bold">Đăng xuất hệ thống</span>
                        </button>
                    </div>
                </div>
            </div>

            <script>
                function confirmLogout() {
                    if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
                        window.location.href = '../index.html';
                    }
                }
            </script>
        </aside>

        <main class="flex-1 overflow-y-auto bg-[#0b0f1a] p-8">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-bold">Danh sách tài khoản</h2>
                    <p class="text-gray-400 text-sm">Quản lý thông tin khách hàng và nội bộ</p>
                </div>
                <button onclick="openFormModal()"
                    class="bg-purple-600 hover:bg-purple-500 px-6 py-3 rounded-2xl font-bold transition-all shadow-lg shadow-purple-600/20 text-sm">
                    + Thêm mới
                </button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="md:col-span-2 relative">
                    <input type="text" id="searchInput" oninput="renderTable()" placeholder="Tìm theo tên, sđt..."
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-12 py-3 outline-none focus:border-purple-500">
                    <svg class="w-5 h-5 absolute left-4 top-3.5 text-gray-500" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </div>
                <select id="roleFilter" onchange="renderTable()"
                    class="bg-white/5 border border-white/10 rounded-2xl px-4 py-3 outline-none focus:border-purple-500 text-gray-300">
                    <option value="all">Tất cả vai trò</option>
                    <option value="Quản lý">Quản lý</option>
                    <option value="Nhân viên">Nhân viên</option>
                    <option value="Khách hàng">Khách hàng</option>
                </select>
            </div>

            <div class="glass rounded-3xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] uppercase text-gray-400 tracking-widest font-bold">
                        <tr>
                            <th class="px-6 py-4">Thành viên</th>
                            <th class="px-6 py-4">Số điện thoại</th>
                            <th class="px-6 py-4">Vai trò</th>
                            <th class="px-6 py-4">Điểm</th>
                            <th class="px-6 py-4 text-right">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="accountTableBody" class="text-sm"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="formModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal('formModal')"></div>
        <form id="userForm" class="glass w-full max-w-md rounded-[2.5rem] p-8 relative z-10 bg-[#161b33]">
            <h4 id="formTitle" class="text-xl font-bold mb-6">Thêm thành viên</h4>
            <input type="hidden" id="userId">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-400 font-bold uppercase">Họ và tên</label>
                    <input type="text" id="userName" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 font-bold uppercase">Số điện thoại</label>
                    <input type="text" id="userPhone" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 font-bold uppercase">Vai trò</label>
                    <select id="userRole" onchange="togglePointInput()"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 outline-none focus:border-purple-500">
                        <option value="Quản lý">Quản lý</option>
                        <option value="Nhân viên">Nhân viên</option>
                        <option value="Khách hàng">Khách hàng</option>
                    </select>
                </div>
                <div id="pointContainer" class="hidden">
                    <label class="text-[10px] text-gray-400 font-bold uppercase">Điểm tích lũy</label>
                    <input type="number" id="userPoints"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 outline-none focus:border-purple-500">
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button type="button" onclick="closeModal('formModal')"
                    class="flex-1 py-3 text-sm font-bold opacity-50 hover:opacity-100">Hủy</button>
                <button type="submit"
                    class="flex-1 py-3 bg-purple-600 rounded-xl text-sm font-bold hover:bg-purple-500 shadow-lg shadow-purple-600/20">Xác
                    nhận</button>
            </div>
        </form>
    </div>

    <div id="viewModal" class="fixed inset-0 z-[110] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal('viewModal')"></div>
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-8 relative z-10 bg-[#161b33] text-center">
            <div id="viewAvt"
                class="w-20 h-20 mx-auto rounded-full bg-purple-600 flex items-center justify-center text-3xl font-black mb-4 shadow-2xl">
            </div>
            <h4 id="viewName" class="text-2xl font-bold mb-1"></h4>
            <p id="viewRole" class="text-purple-400 text-xs font-bold uppercase tracking-widest mb-6"></p>
            <div class="space-y-3 text-left bg-white/5 p-4 rounded-2xl border border-white/10">
                <div class="flex justify-between"><span class="text-gray-400 text-xs">Số điện thoại:</span> <span
                        id="viewPhone" class="font-bold"></span></div>
                <div class="flex justify-between"><span class="text-gray-400 text-xs">Điểm tích lũy:</span> <span
                        id="viewPoints" class="font-bold text-emerald-400"></span></div>
            </div>
            <button onclick="closeModal('viewModal')"
                class="mt-8 w-full py-3 bg-white/10 rounded-xl font-bold hover:bg-white/20">Đóng</button>
        </div>
    </div>

    <script>
        // JS thuần Array logic
        let accounts = [
            { id: 1, name: 'Hoàng Tony', phone: '0901234567', role: 'Quản lý', points: 0 },
            { id: 2, name: 'Bảo Trân', phone: '0988666777', role: 'Khách hàng', points: 2500 },
            { id: 3, name: 'Minh Tuấn', phone: '0933111222', role: 'Nhân viên', points: 0 }
        ];

        const renderTable = () => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('roleFilter').value;
            const tbody = document.getElementById('accountTableBody');

            const filtered = accounts.filter(a => {
                const matchSearch = a.name.toLowerCase().includes(search) || a.phone.includes(search);
                const matchRole = filter === 'all' || a.role === filter;
                return matchSearch && matchRole;
            });

            tbody.innerHTML = filtered.map(a => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition-all">
                    <td class="px-6 py-4 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center font-bold text-xs border border-white/20 italic">
                            ${a.name.charAt(0)}
                        </div>
                        <span class="font-bold text-gray-200">${a.name}</span>
                    </td>
                    <td class="px-6 py-4 text-gray-400 font-mono">${a.phone}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-md text-[9px] font-black uppercase border ${getBadgeStyle(a.role)}">
                            ${a.role}
                        </span>
                    </td>
                    <td class="px-6 py-4 font-bold text-emerald-400">${a.role === 'Khách hàng' ? a.points.toLocaleString() : '-'}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="viewDetail(${a.id})" class="p-2 hover:text-purple-400 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg></button>
                        <button onclick="openFormModal(${a.id})" class="p-2 hover:text-blue-400 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-width="2"/></svg></button>
                        <button onclick="deleteAcc(${a.id})" class="p-2 hover:text-rose-500 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"/></svg></button>
                    </td>
                </tr>
            `).join('');
        };

        const getBadgeStyle = (role) => {
            if (role === 'Quản lý') return 'border-purple-500/50 text-purple-400 bg-purple-500/10';
            if (role === 'Nhân viên') return 'border-blue-500/50 text-blue-400 bg-blue-500/10';
            return 'border-amber-500/50 text-amber-400 bg-amber-500/10';
        };

        const togglePointInput = () => {
            const role = document.getElementById('userRole').value;
            document.getElementById('pointContainer').classList.toggle('hidden', role !== 'Khách hàng');
        };

        // Modal Logic
        const openFormModal = (id = null) => {
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = id || '';
            document.getElementById('formTitle').innerText = id ? 'Cập nhật thành viên' : 'Thêm thành viên';

            if (id) {
                const a = accounts.find(acc => acc.id === id);
                document.getElementById('userName').value = a.name;
                document.getElementById('userPhone').value = a.phone;
                document.getElementById('userRole').value = a.role;
                document.getElementById('userPoints').value = a.points;
            }
            togglePointInput();
            document.getElementById('formModal').classList.remove('hidden');
        };

        const viewDetail = (id) => {
            const a = accounts.find(acc => acc.id === id);
            document.getElementById('viewAvt').innerText = a.name.charAt(0);
            document.getElementById('viewName').innerText = a.name;
            document.getElementById('viewRole').innerText = a.role;
            document.getElementById('viewPhone').innerText = a.phone;
            document.getElementById('viewPoints').innerText = a.role === 'Khách hàng' ? a.points.toLocaleString() + ' pts' : 'Không áp dụng';
            document.getElementById('viewModal').classList.remove('hidden');
        };

        const closeModal = (modalId) => document.getElementById(modalId).classList.add('hidden');

        document.getElementById('userForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const role = document.getElementById('userRole').value;
            const data = {
                name: document.getElementById('userName').value,
                phone: document.getElementById('userPhone').value,
                role: role,
                points: role === 'Khách hàng' ? parseInt(document.getElementById('userPoints').value || 0) : 0
            };

            if (id) {
                const idx = accounts.findIndex(acc => acc.id == id);
                accounts[idx] = { ...accounts[idx], ...data };
            } else {
                accounts.push({ id: Date.now(), ...data });
            }
            closeModal('formModal');
            renderTable();
        };

        const deleteAcc = (id) => {
            if (confirm('Bạn có chắc chắn muốn xóa?')) {
                accounts = accounts.filter(acc => acc.id !== id);
                renderTable();
            }
        };

        renderTable();
    </script>
</body>

</html>
